<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Inspector Pro V15.0 - Print Order Fix</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
    :root { --rust: #bf4020; --ink: #1c1814; --green: #3d6b38; --light: #f4f4f4; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--light); color: var(--ink); }
    
    /* UI ELEMENTS */
    .no-print { display: block; }
    .topbar { background: var(--ink); color: white; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
    .sheet-bar { background: #e0e0e0; padding: 10px; display: flex; gap: 8px; overflow-x: auto; border-bottom: 1px solid #ccc; align-items: center; }
    .sheet-tab { padding: 8px 15px; background: #bbb; border-radius: 6px; font-size: 11px; font-weight: bold; border: none; cursor: pointer; display: flex; align-items: center; gap: 8px; }
    .sheet-tab.active { background: var(--rust); color: white; }
    
    .viewport { position: relative; overflow: auto; background: #555; height: calc(100vh - 180px); display: flex; justify-content: center; align-items: flex-start; }
    #canvas-wrap { position: relative; background: white; transform-origin: 0 0; margin: 20px; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
    #overlay-canvas { position: absolute; top: 0; left: 0; cursor: crosshair; }

    .controls { position: fixed; bottom: 150px; right: 20px; display: flex; flex-direction: column; gap: 12px; z-index: 1000; }
    .btn-round { width: 50px; height: 50px; border-radius: 50%; background: var(--ink); color: white; border: none; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    .btn-round.active { background: var(--rust); border: 2px solid white; }

    .footer-list { height: 120px; background: white; border-top: 2px solid #ccc; overflow-y: auto; padding: 5px; }
    .loc-row { padding: 10px 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; font-size: 13px; cursor: pointer; }

    /* MODAL STYLING */
    .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 3000; align-items: center; justify-content: center; }
    .modal-bg.open { display: flex; }
    .modal { background: white; width: 95%; max-width: 500px; padding: 20px; border-radius: 12px; max-height: 90vh; overflow-y: auto; }
    input, select, textarea { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
    .btn-block { background: var(--rust); color: white; padding: 12px; border: none; border-radius: 6px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }

    /* REPORT VIEW */
    #report-overlay { display: none; position: fixed; inset: 0; background: #333; z-index: 5000; overflow-y: auto; }
    .report-actions { position: fixed; top: 20px; right: 20px; z-index: 6000; display: flex; gap: 10px; }

    /* PRINT ARCHITECTURE - HIER GEBEURT HET */
    .a4-page { 
        width: 210mm; 
        min-height: 297mm; 
        padding: 20mm; 
        margin: 10mm auto; 
        background: white; 
        box-shadow: 0 0 10px rgba(0,0,0,0.5); 
        position: relative; 
        display: block; /* Forceert blok-weergave */
        page-break-after: always;
        overflow: hidden;
    }

    @media print {
        .no-print, .topbar, .sheet-bar, .controls, .footer-list, .modal-bg, .report-actions { display: none !important; }
        body, html { background: white !important; margin: 0 !important; padding: 0 !important; overflow: visible !important; }
        #report-overlay { display: block !important; position: static !important; background: white !important; }
        .a4-page { margin: 0 !important; box-shadow: none !important; width: 100% !important; border: none !important; page-break-after: always !important; display: block !important; }
    }

    /* RAPPORT CONTENT STYLES */
    .cover-title { font-size: 32pt; font-weight: 800; text-align: center; margin: 40mm 0 10mm 0; }
    .report-img { width: 100%; max-height: 120mm; object-fit: contain; border: 1px solid #ddd; margin: 10px 0; }
    .loc-card { border: 1px solid #eee; border-left: 5mm solid var(--bc); padding: 15px; margin-bottom: 15px; break-inside: avoid; background: #fafafa; }
    .photo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
    .photo-grid img { width: 100%; height: 160px; object-fit: cover; border-radius: 4px; }
</style>
</head>
<body>

<div class="no-print">
    <div class="topbar">
        <span style="font-weight: 900;">INSPECTOR PRO V15.0</span>
        <div>
            <button onclick="openM('project-modal')" style="background:none; color:white; border:1px solid white; padding:6px 12px; border-radius:4px; cursor:pointer;">PROJECT DATA</button>
            <button onclick="generateReport()" style="background: var(--green); color: white; border: none; padding: 8px 16px; border-radius: 6px; font-weight: bold; cursor: pointer; margin-left: 10px;">RAPPORTAGE</button>
        </div>
    </div>

    <div class="sheet-bar" id="sheet-tabs">
        <button onclick="document.getElementById('file-in').click()" style="background:black; color:white; border:none; padding:8px 12px; border-radius:4px; cursor:pointer; font-weight:bold;">+ GEVEL</button>
    </div>
    <input type="file" id="file-in" accept="image/*,application/pdf" style="display:none" onchange="handleFile(event)">

    <div class="viewport">
        <div id="canvas-wrap">
            <canvas id="main-canvas"></canvas>
            <canvas id="overlay-canvas"></canvas>
        </div>
    </div>

    <div class="controls">
        <button class="btn-round active" id="m-mark" onclick="setMode('mark')">📍</button>
        <button class="btn-round" id="m-drag" onclick="setMode('drag')">✢</button>
        <button class="btn-round" onclick="zoom(1.2)">➕</button>
        <button class="btn-round" onclick="zoom(0.8)">➖</button>
    </div>

    <div class="footer-list" id="loc-list"></div>
</div>

<div id="report-overlay">
    <div class="report-actions no-print">
        <button onclick="window.print()" style="padding:15px 30px; background:var(--green); color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">🖨️ PRINT NAAR PDF</button>
        <button onclick="document.getElementById('report-overlay').style.display='none'" style="padding:15px; background:white; border:none; border-radius:8px; cursor:pointer;">X SLUITEN</button>
    </div>
    <div id="report-content"></div>
</div>

<div class="modal-bg" id="project-modal">
    <div class="modal">
        <h3>Projectgegevens</h3>
        <input type="text" id="p-title" value="INSPECTIERAPPORT HOUTROT">
        <input type="text" id="p-client" placeholder="Opdrachtgever">
        <input type="text" id="p-name" placeholder="Projectnaam/Adres">
        <input type="text" id="p-inspector" placeholder="Naam Inspecteur">
        <input type="date" id="p-date">
        <p style="font-size:11px; margin-top:10px;">LOGO'S:</p>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <input type="file" onchange="readLogo(this, 'our')">
            <input type="file" onchange="readLogo(this, 'client')">
        </div>
        <button class="btn-block" onclick="closeM('project-modal')">OPSLAAN</button>
    </div>
</div>

<div class="modal-bg" id="loc-modal">
    <div class="modal">
        <h3 id="modal-head">Nieuw Inspectiepunt</h3>
        <select id="m-color">
            <option value="#ef4444">Rood - Direct herstel</option>
            <option value="#f59e0b">Oranje - Preventief herstel</option>
            <option value="#3b82f6">Blauw - Monitoring</option>
        </select>
        <input type="text" id="m-naam" placeholder="Onderdeel (bv. Kozijn A1)">
        <select id="m-maatregel">
            <option value="P2: Afdichten van naden">P2: Afdichten van naden</option>
            <option value="C1: Herstellen van hout">C1: Herstellen van hout</option>
            <option value="C4: Deelvervanging">C4: Deelvervanging</option>
        </select>
        <textarea id="m-desc" placeholder="Aanvullende opmerkingen"></textarea>
        <button onclick="document.getElementById('ph-in').click()" class="btn-block" style="background:#555;">📸 FOTO'S TOEVOEGEN</button>
        <input type="file" id="ph-in" multiple accept="image/*" style="display:none" onchange="addPhotos(event)">
        <div id="ph-grid" style="display:grid; grid-template-columns:repeat(3,1fr); gap:5px; margin-top:10px;"></div>
        <button class="btn-block" onclick="saveLoc()">PUNT OPSLAAN</button>
        <button onclick="deleteLoc()" id="del-btn" style="display:none; color:red; border:none; background:none; width:100%; margin-top:10px; cursor:pointer;">Verwijder punt</button>
    </div>
</div>

<script>
// CORE LOGIC
let sheets = [], activeIdx = -1, mode = 'mark', scale = 1;
let logos = { our: null, client: null };
let curPh = [], curId = null, curX = 0, curY = 0;

const mCvs = document.getElementById('main-canvas'), oCvs = document.getElementById('overlay-canvas');
const mCtx = mCvs.getContext('2d'), oCtx = oCvs.getContext('2d');

function openM(id) { document.getElementById(id).classList.add('open'); }
function closeM(id) { document.getElementById(id).classList.remove('open'); }

async function handleFile(e) {
    const file = e.target.files[0]; if(!file) return;
    const r = new FileReader();
    r.onload = async (ev) => {
        let data;
        if(file.type === 'application/pdf') {
            const pdf = await pdfjsLib.getDocument({data: ev.target.result}).promise;
            const page = await pdf.getPage(1);
            const vp = page.getViewport({scale: 2.0});
            const tCvs = document.createElement('canvas'); tCvs.width = vp.width; tCvs.height = vp.height;
            await page.render({canvasContext: tCvs.getContext('2d'), viewport: vp}).promise;
            data = tCvs.toDataURL('image/jpeg', 0.8);
        } else data = ev.target.result;
        sheets.push({ name: file.name.split('.')[0], locs: [], imgData: data });
        switchSheet(sheets.length - 1);
    };
    file.type === 'application/pdf' ? r.readAsArrayBuffer(file) : r.readAsDataURL(file);
}

function switchSheet(idx) {
    activeIdx = idx; const img = new Image();
    img.onload = () => {
        mCvs.width = oCvs.width = img.width; mCvs.height = oCvs.height = img.height;
        mCtx.drawImage(img, 0, 0);
        scale = (document.querySelector('.viewport').clientWidth - 40) / img.width;
        updateTabs(); renderList(); redraw(); zoom(1);
    }; img.src = sheets[idx].imgData;
}

function updateTabs() {
    const bar = document.getElementById('sheet-tabs');
    const addBtn = bar.querySelector('button');
    bar.innerHTML = ''; bar.appendChild(addBtn);
    sheets.forEach((s, i) => {
        const t = document.createElement('button');
        t.className = `sheet-tab ${i===activeIdx?'active':''}`;
        t.innerHTML = `<span onclick="switchSheet(${i})">${s.name}</span>`;
        bar.appendChild(t);
    });
}

oCvs.addEventListener('mousedown', (e) => {
    if(activeIdx === -1) return;
    const r = oCvs.getBoundingClientRect();
    const x = (e.clientX - r.left) / scale;
    const y = (e.clientY - r.top) / scale;
    const hit = sheets[activeIdx].locs.find(l => Math.hypot(l.x - x, l.y - y) < 20/scale);
    if(hit) openLoc(hit); else if(mode==='mark') openLoc(null, x, y);
});

function openLoc(l, x, y) {
    curId = l ? l.id : null; curX = l ? l.x : x; curY = l ? l.y : y; curPh = l ? [...l.fotos] : [];
    document.getElementById('m-naam').value = l ? l.naam : "";
    document.getElementById('m-desc').value = l ? l.desc : "";
    document.getElementById('m-maatregel').value = l ? l.maatregel : "P2: Afdichten van naden";
    document.getElementById('m-color').value = l ? l.color : "#ef4444";
    document.getElementById('del-btn').style.display = l ? 'block' : 'none';
    renderPh(); openM('loc-modal');
}

function saveLoc() {
    const d = { id: curId||Date.now(), x: curX, y: curY, naam: document.getElementById('m-naam').value, maatregel: document.getElementById('m-maatregel').value, desc: document.getElementById('m-desc').value, color: document.getElementById('m-color').value, fotos: [...curPh] };
    if(curId) sheets[activeIdx].locs = sheets[activeIdx].locs.map(l => l.id === curId ? d : l);
    else sheets[activeIdx].locs.push(d);
    closeM('loc-modal'); redraw(); renderList();
}

function redraw() {
    oCtx.clearRect(0,0,oCvs.width,oCvs.height);
    if(activeIdx!==-1) sheets[activeIdx].locs.forEach((l, i) => {
        oCtx.beginPath(); oCtx.arc(l.x, l.y, 18/scale, 0, Math.PI*2); oCtx.fillStyle = l.color; oCtx.fill();
        oCtx.fillStyle="white"; oCtx.font=`bold ${14/scale}px Arial`; oCtx.textAlign="center"; oCtx.fillText(i+1, l.x, l.y+(5/scale));
    });
}

function renderList() {
    const list = document.getElementById('loc-list'); list.innerHTML = '';
    if(activeIdx!==-1) sheets[activeIdx].locs.forEach((l, i) => {
        list.innerHTML += `<div class="loc-row" onclick="openLocById(${l.id})"><b>${i+1}. ${l.naam}</b> <span>${l.maatregel}</span></div>`;
    });
}
function openLocById(id) { openLoc(sheets[activeIdx].locs.find(l => l.id === id)); }
function addPhotos(e) { Array.from(e.target.files).forEach(f => { const r = new FileReader(); r.onload=(ev)=> {curPh.push(ev.target.result); renderPh();}; r.readAsDataURL(f); }); }
function renderPh() { const g = document.getElementById('ph-grid'); g.innerHTML = curPh.map((p,i)=>`<img src="${p}" style="width:100%;aspect-ratio:1;object-fit:cover;">`).join(''); }
function deleteLoc() { sheets[activeIdx].locs = sheets[activeIdx].locs.filter(l => l.id !== curId); closeM('loc-modal'); redraw(); renderList(); }
function zoom(f) { scale *= f; document.getElementById('canvas-wrap').style.transform = `scale(${scale})`; }
function setMode(m) { mode = m; document.getElementById('m-mark').className = m==='mark'?'btn-round active':'btn-round'; document.getElementById('m-drag').className = m==='drag'?'btn-round active':'btn-round'; }
function readLogo(i, t) { const r = new FileReader(); r.onload=(e)=>logos[t]=e.target.result; r.readAsDataURL(i.files[0]); }

// --- REPORT ENGINE V15.0 ---
async function generateReport() {
    const cont = document.getElementById('report-content');
    cont.innerHTML = "<p style='color:white;text-align:center;padding-top:50px;'>Rapport genereren...</p>";
    document.getElementById('report-overlay').style.display = 'block';

    const p = {
        title: document.getElementById('p-title').value,
        client: document.getElementById('p-client').value,
        project: document.getElementById('p-name').value,
        inspector: document.getElementById('p-inspector').value,
        date: document.getElementById('p-date').value
    };

    // 1. VOORBLAD (STRIKT ALS EERSTE ELEMENT)
    let html = `
    <div class="a4-page">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            ${logos.our ? `<img src="${logos.our}" style="max-height:60px;">` : '<div></div>'}
            ${logos.client ? `<img src="${logos.client}" style="max-height:60px;">` : '<div></div>'}
        </div>
        <h1 class="cover-title">${p.title}</h1>
        <h2 style="text-align:center; color:var(--rust); margin-bottom:50mm;">${p.project}</h2>
        <div style="border-top:1px solid #000; padding-top:10mm; font-size:14pt;">
            <p><b>Opdrachtgever:</b> ${p.client}</p>
            <p><b>Inspecteur:</b> ${p.inspector}</p>
            <p><b>Datum:</b> ${p.date}</p>
        </div>
    </div>`;

    // 2. GEVEL PAGINA'S
    for(let s of sheets) {
        const screenshot = await new Promise(res => {
            const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d'); const img = new Image();
            img.onload = () => {
                canvas.width = img.width; canvas.height = img.height; ctx.drawImage(img, 0, 0);
                s.locs.forEach((l, idx) => {
                    ctx.beginPath(); ctx.arc(l.x, l.y, 25, 0, Math.PI*2); ctx.fillStyle = l.color; ctx.fill();
                    ctx.fillStyle="white"; ctx.font="bold 26px Arial"; ctx.textAlign="center"; ctx.fillText(idx+1, l.x, l.y+10);
                });
                res(canvas.toDataURL('image/jpeg', 0.8));
            }; img.src = s.imgData;
        });

        html += `
        <div class="a4-page">
            <h2 style="background:var(--ink); color:white; padding:10px; margin-bottom:10px;">Gevel: ${s.name}</h2>
            <img src="${screenshot}" class="report-img">
            <div id="points-${sheets.indexOf(s)}">`;
        
        let counter = 0;
        for(let l of s.locs) {
            counter++;
            if(counter > 2) { // Na 2 punten op overzichtspagina, nieuwe pagina
                html += `</div></div><div class="a4-page"><h2>Vervolg: ${s.name}</h2><div id="points-ext-${sheets.indexOf(s)}">`;
                counter = 1;
            }
            html += `
            <div class="loc-card" style="--bc:${l.color}">
                <h3>${s.locs.indexOf(l)+1}. ${l.naam}</h3>
                <p><b>Maatregel:</b> ${l.maatregel}</p>
                <p><b>Opmerking:</b> ${l.desc || '-'}</p>
                <div class="photo-grid">${l.fotos.map(f=>`<img src="${f}">`).join('')}</div>
            </div>`;
        }
        html += `</div></div>`;
    }

    cont.innerHTML = html;
}

pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
</script>
</body>
</html>
