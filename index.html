<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Inspector Pro V14.3 - Marker Fix</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
    :root { --rust: #bf4020; --ink: #1c1814; --green: #3d6b38; --light: #f4f4f4; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; background: var(--light); overflow: hidden; }
    
    .topbar { background: var(--ink); color: white; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
    .sheet-bar { background: #e0e0e0; padding: 10px; display: flex; gap: 8px; overflow-x: auto; border-bottom: 1px solid #ccc; min-height: 50px; align-items: center; }
    .sheet-tab { padding: 8px 15px; background: #bbb; border-radius: 6px; font-size: 11px; font-weight: bold; border: none; cursor: pointer; white-space: nowrap; }
    .sheet-tab.active { background: var(--rust); color: white; }

    .viewport { flex: 1; position: relative; overflow: auto; background: #555; }
    #canvas-wrap { position: relative; display: inline-block; background: white; transform-origin: 0 0; margin: 20px; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
    canvas { display: block; }
    #overlay-canvas { position: absolute; top: 0; left: 0; cursor: crosshair; }

    .controls { position: fixed; bottom: 160px; right: 20px; display: flex; flex-direction: column; gap: 12px; z-index: 1000; }
    .btn { width: 50px; height: 50px; border-radius: 50%; background: var(--ink); color: white; border: none; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    .btn.active { background: var(--rust); border: 2px solid white; }

    .footer-list { height: 130px; background: white; border-top: 2px solid #ccc; overflow-y: auto; }
    .loc-row { padding: 12px 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; font-size: 13px; cursor: pointer; }

    .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; align-items: center; justify-content: center; padding: 15px; }
    .modal-bg.open { display: flex; }
    .modal { background: white; width: 100%; max-width: 550px; padding: 25px; border-radius: 10px; max-height: 90vh; overflow-y: auto; }
    
    label { font-size: 10px; font-weight: bold; color: #666; margin-top: 12px; display: block; text-transform: uppercase; }
    input, textarea, select { width: 100%; padding: 10px; margin: 5px 0 10px 0; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; }
    .btn-main { background: var(--rust); color: white; font-weight: bold; border: none; width: 100%; padding: 14px; border-radius: 6px; cursor: pointer; font-size: 16px; margin-top: 10px; }
    .btn-outline { background: white; color: var(--ink); border: 1px solid #ccc; padding: 10px; border-radius: 6px; cursor: pointer; width: 100%; margin-top: 5px; font-weight: bold; }

    #report-view { display: none; position: fixed; inset: 0; background: #333; z-index: 5000; overflow-y: auto; padding: 20px 0; }
    #report-content { width: 210mm; margin: 0 auto; background: white; }

    @media print {
        body { overflow: visible !important; height: auto !important; }
        .report-ui, .topbar, .sheet-bar, .controls, .footer-list, .modal-bg { display: none !important; }
        #report-view { display: block !important; position: absolute !important; top:0; left:0; width: 100% !important; background: white; padding: 0; }
        #report-content { width: 100%; margin: 0; box-shadow: none; }
        .page-break { page-break-before: always; display: block; }
        .cover-page { height: 280mm; display: flex; flex-direction: column; justify-content: space-between; padding: 20mm; text-align: center; }
        .report-page { padding: 15mm; min-height: 290mm; page-break-after: always; }
        .loc-block { break-inside: avoid; border: 1px solid #ddd; padding: 15px; margin-bottom: 20px; border-left: 10px solid var(--bc); }
        .photo-grid-rep { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .photo-grid-rep img { width: 100%; height: 220px; object-fit: cover; border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; margin: 20px 0; font-size: 11px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
    }
</style>
</head>
<body>

<div class="topbar">
    <div>
        <span style="font-weight: 800; margin-right: 15px;">INSPECTOR PRO v14.3</span>
        <button onclick="openM('file-modal')" style="background:#444; color:white; border:none; padding:6px 10px; border-radius:4px; cursor:pointer;">📁 PROJECT</button>
    </div>
    <div>
        <button onclick="openM('project-modal')" style="background:none; color:white; border:1px solid white; padding:8px 12px; border-radius:6px; cursor:pointer; margin-right:10px;">DATA</button>
        <button onclick="generateReport()" style="background: var(--green); color: white; border: none; padding: 9px 15px; border-radius: 6px; font-weight: bold; cursor: pointer;">RAPPORT</button>
    </div>
</div>

<div class="sheet-bar" id="sheet-tabs">
    <button onclick="document.getElementById('file-in').click()" style="padding: 8px 15px; background: black; color: white; border-radius: 6px; border:none; font-weight:bold; cursor: pointer;">+ GEVEL</button>
</div>
<input type="file" id="file-in" accept="image/*,application/pdf" style="display:none" onchange="handleFile(event)">

<div class="viewport">
    <div id="canvas-wrap">
        <canvas id="main-canvas"></canvas>
        <canvas id="overlay-canvas"></canvas>
    </div>
</div>

<div class="controls">
    <button class="btn active" id="m-mark" onclick="setMode('mark')">📍</button>
    <button class="btn" id="m-drag" onclick="setMode('drag')">✢</button>
    <button class="btn" onclick="zoom(1.2)">➕</button>
    <button class="btn" onclick="zoom(0.8)">➖</button>
</div>

<div class="footer-list" id="loc-list"></div>

<div class="modal-bg" id="loc-modal">
    <div class="modal">
        <h3>Inspectiepunt Details</h3>
        <label>Urgentie</label>
        <select id="m-color-sel">
            <option value="#ef4444">Rood - Direct herstel</option>
            <option value="#f59e0b">Oranje - Onderhoud</option>
            <option value="#3b82f6">Blauw - Monitoring</option>
        </select>
        <label>Onderdeel</label><input type="text" id="m-naam" placeholder="Bijv. Onderdorpel">
        <label>Maatregel</label>
        <select id="m-werkwijze">
            <option value="P2: Afdichten van naden en verbindingen (buiten)">P2: Afdichten van naden en verbindingen (buiten)</option>
            <option value="P3: Afdichten van aansluiting stijl met neut">P3: Afdichten van aansluiting stijl met neut</option>
            <option value="P4: Herstellen van scheuren">P4: Herstellen van scheuren</option>
            <option value="P5: Herstellen van natuurlijke gebreken">P5: Herstellen van natuurlijke gebreken</option>
            <option value="P6: Afdichten van kale en/of kopse kanten">P6: Afdichten van kale en/of kopse kanten</option>
            <option value="P7: Afronden van verweerde en/of scherpe kanten">P7: Afronden van verweerde en/of scherpe kanten</option>
            <option value="P8: Corrigeren van de omtrekspeling van draaiende delen">P8: Corrigeren van de omtrekspeling van draaiende delen</option>
            <option value="P9: Herstellen van oppervlaktebeschadigingen">P9: Herstellen van oppervlaktebeschadigingen</option>
            <option value="P10: Afdichten van verbindingen (binnen)">P10: Afdichten van verbindingen (binnen)</option>
            <option value="P11: Herstellen van gedelamineerd geveltimmerwerk en haarscheuren">P11: Herstellen van gedelamineerd geveltimmerwerk en haarscheuren</option>
            <option value="P12: Detailverbetering van de aansluiting van houten onderdorpels">P12: Detailverbetering van de aansluiting van houten onderdorpels</option>
            <option value="C1: Herstellen van aangetast hout in houtconstructies">C1: Herstellen van aangetast hout in houtconstructies</option>
            <option value="C2: Herstellen door middel van lamineren">C2: Herstellen door middel van lamineren</option>
            <option value="C4: Herstellen door deelvervanging">C4: Herstellen door deelvervanging</option>
            <option value="PG1: Vervangen van ondeugdelijke kitvoegen">PG1: Vervangen van ondeugdelijke kitvoegen</option>
            <option value="PG2: Vervangen van ondeugdelijke stopverfkanten">PG2: Vervangen van ondeugdelijke stopverfkanten</option>
            <option value="PG6: Aanbrengen van geventileerde neuslatten">PG6: Aanbrengen van geventileerde neuslatten</option>
        </select>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <div><label>Uren</label><input type="number" id="m-uren" step="0.5" value="0"></div>
            <div><label>Materiaal (€)</label><input type="number" id="m-mat" value="0"></div>
        </div>
        <label>Opmerkingen</label><textarea id="m-desc" rows="2"></textarea>
        
        <button onclick="document.getElementById('ph-in').click()" class="btn-outline">📸 FOTO'S TOEVOEGEN</button>
        <input type="file" id="ph-in" multiple accept="image/*" style="display:none" onchange="addPhotos(event)">
        <div id="ph-grid" style="display:grid; grid-template-columns:repeat(3,1fr); gap:5px; margin-top:10px;"></div>
        
        <button class="btn-main" onclick="saveLoc()">OPSLAAN PUNT</button>
        <button onclick="deleteLoc()" style="color:red; background:none; border:none; width:100%; margin-top:10px; cursor:pointer;">VERWIJDER PUNT</button>
    </div>
</div>

<div class="modal-bg" id="file-modal"><div class="modal"><h3>Project Opslag</h3><button class="btn-main" onclick="exportProject()">DOWNLOAD .JSON</button><label>Importeer .JSON</label><input type="file" accept=".json" onchange="importProject(event)"><button class="btn-outline" onclick="closeM('file-modal')">SLUITEN</button></div></div>
<div class="modal-bg" id="project-modal"><div class="modal"><h3>Project Instellingen</h3><label>Titel</label><input type="text" id="p-title" value="INSPECTIERAPPORT HOUTROT"><label>Opdrachtgever</label><input type="text" id="p-client"><label>Projectlocatie</label><input type="text" id="p-name"><label>Inspecteur</label><input type="text" id="p-inspector"><label>Datum</label><input type="date" id="p-date"><button class="btn-main" onclick="closeM('project-modal')">OPSLAAN</button></div></div>

<div id="report-view">
    <div class="report-ui" style="width:210mm; margin:10px auto; display:flex; gap:10px;">
        <button onclick="document.getElementById('report-view').style.display='none'" style="flex:1; padding:10px;">TERUG</button>
        <button onclick="window.print()" style="flex:2; padding:10px; background:var(--green); color:white; border:none; font-weight:bold;">PDF PRINTEN</button>
    </div>
    <div id="report-content"></div>
</div>

<script>
let sheets = [], activeIdx = -1, mode = 'mark', scale = 1, activeDrag = null;
let curPh = [], curId = null, curX = 0, curY = 0;
const mCvs = document.getElementById('main-canvas'), oCvs = document.getElementById('overlay-canvas');
const mCtx = mCvs.getContext('2d'), oCtx = oCvs.getContext('2d');

function openM(id) { document.getElementById(id).classList.add('open'); }
function closeM(id) { document.getElementById(id).classList.remove('open'); autoSave(); }

// --- ESSENTIAL CORE FIX ---
function handleInteraction(e) {
    if(activeIdx === -1) return;
    const r = oCvs.getBoundingClientRect();
    const x = ((e.touches ? e.touches[0].clientX : e.clientX) - r.left) / scale;
    const y = ((e.touches ? e.touches[0].clientY : e.clientY) - r.top) / scale;

    if(e.type === 'mousedown' || e.type === 'touchstart') {
        // Check of we op een bestaand punt klikken
        const hit = sheets[activeIdx].locs.find(l => Math.hypot(l.x - x, l.y - y) < 20/scale);
        
        if(mode === 'drag' && hit) { 
            activeDrag = hit; 
        } else if(mode === 'mark') {
            if(hit) {
                openLoc(hit); // Open bestaand punt
            } else {
                // NIEUW PUNT: zet coördinaten vast en open modal
                curX = x; curY = y;
                openLoc(null, x, y);
            }
        }
    } else if((e.type === 'mousemove' || e.type === 'touchmove') && activeDrag) {
        activeDrag.x = x; activeDrag.y = y; redraw();
    } else { activeDrag = null; }
}

function openLoc(l, x, y) {
    curId = l ? l.id : null; 
    // Als het een nieuw punt is, gebruik de geklikte x,y. Als het bestaand is, gebruik de x,y van het punt.
    curX = l ? l.x : x; 
    curY = l ? l.y : y;
    curPh = l ? [...l.fotos] : [];
    
    document.getElementById('m-naam').value = l ? l.naam : "";
    document.getElementById('m-desc').value = l ? l.desc : "";
    document.getElementById('m-uren').value = l ? l.uren : 0;
    document.getElementById('m-mat').value = l ? l.mat : 0;
    document.getElementById('m-werkwijze').value = l ? l.werkwijze : "P2: Afdichten van naden en verbindingen (buiten)";
    document.getElementById('m-color-sel').value = l ? l.color : "#ef4444";
    
    renderPh();
    openM('loc-modal');
}

function saveLoc() {
    if(activeIdx === -1) return;
    const s = sheets[activeIdx];
    
    const d = { 
        id: curId || Date.now(), 
        x: curX, 
        y: curY, 
        naam: document.getElementById('m-naam').value || "Punt", 
        desc: document.getElementById('m-desc').value, 
        werkwijze: document.getElementById('m-werkwijze').value, 
        uren: parseFloat(document.getElementById('m-uren').value) || 0,
        mat: parseFloat(document.getElementById('m-mat').value) || 0, 
        color: document.getElementById('m-color-sel').value, 
        fotos: [...curPh] 
    };
    
    if(curId) {
        s.locs = s.locs.map(l => l.id === curId ? d : l);
    } else {
        s.locs.push(d);
    }
    
    closeM('loc-modal');
    redraw();
    renderList();
    autoSave();
}

// --- REST VAN DE LOGICA ---
function redraw() {
    oCtx.clearRect(0,0,oCvs.width,oCvs.height);
    if(activeIdx !== -1) {
        sheets[activeIdx].locs.forEach((l, i) => {
            oCtx.beginPath(); oCtx.arc(l.x, l.y, 18/scale, 0, Math.PI*2);
            oCtx.fillStyle = l.color; oCtx.fill();
            oCtx.fillStyle="white"; oCtx.font=`bold ${14/scale}px Arial`; oCtx.textAlign="center";
            oCtx.fillText(i+1, l.x, l.y+(5/scale));
        });
    }
}

function switchSheet(idx) {
    activeIdx = idx; const img = new Image();
    img.onload = () => {
        mCvs.width = oCvs.width = img.width; mCvs.height = oCvs.height = img.height;
        mCtx.drawImage(img, 0, 0); scale = (document.querySelector('.viewport').clientWidth - 40) / img.width;
        updateTabs(); renderList(); redraw(); zoom(1);
    }; img.src = sheets[idx].imgData;
}

function addPhotos(e) {
    Array.from(e.target.files).forEach(f => {
        const r = new FileReader(); r.onload = (ev) => { curPh.push(ev.target.result); renderPh(); }; r.readAsDataURL(f);
    });
}
function renderPh() {
    const g = document.getElementById('ph-grid'); g.innerHTML = '';
    curPh.forEach((src, i) => { g.innerHTML += `<div style="position:relative"><img src="${src}" style="width:100%;aspect-ratio:1;object-fit:cover;border-radius:4px;"><div onclick="curPh.splice(${i},1);renderPh()" style="position:absolute;top:0;right:0;background:red;color:white;width:20px;height:20px;border-radius:50%;text-align:center;cursor:pointer">×</div></div>`; });
}
function deleteLoc() { sheets[activeIdx].locs = sheets[activeIdx].locs.filter(l => l.id !== curId); closeM('loc-modal'); redraw(); renderList(); }
function setMode(m) { mode = m; document.querySelectorAll('.controls .btn').forEach(b=>b.classList.remove('active')); document.getElementById('m-'+m).classList.add('active'); }
function zoom(f) { scale *= f; document.getElementById('canvas-wrap').style.transform = `scale(${scale})`; }

async function handleFile(e) {
    const file = e.target.files[0]; if(!file) return;
    const r = new FileReader();
    r.onload = async (ev) => {
        let data;
        if(file.type === 'application/pdf') {
            const pdf = await pdfjsLib.getDocument({data: ev.target.result}).promise;
            const page = await pdf.getPage(1);
            const vp = page.getViewport({scale: 2.0});
            const tCvs = document.createElement('canvas'); tCvs.width = vp.width; tCvs.height = vp.height;
            await page.render({canvasContext: tCvs.getContext('2d'), viewport: vp}).promise;
            data = tCvs.toDataURL('image/jpeg', 0.7);
        } else data = ev.target.result;
        sheets.push({ name: file.name.split('.')[0], locs: [], imgData: data });
        switchSheet(sheets.length - 1);
    };
    file.type === 'application/pdf' ? r.readAsArrayBuffer(file) : r.readAsDataURL(file);
}

function updateTabs() {
    const bar = document.getElementById('sheet-tabs');
    bar.querySelectorAll('.sheet-tab').forEach(t => t.remove());
    sheets.forEach((s, i) => {
        const t = document.createElement('button');
        t.className = `sheet-tab ${i===activeIdx?'active':''}`;
        t.textContent = s.name; t.onclick = () => switchSheet(i);
        bar.appendChild(t);
    });
}

function renderList() {
    const l = document.getElementById('loc-list'); l.innerHTML = '';
    if(activeIdx !== -1) sheets[activeIdx].locs.forEach((loc, i) => {
        l.innerHTML += `<div class="loc-row" onclick="openLocById(${loc.id})"><span><b>${i+1}.</b> ${loc.naam}</span> <span>${loc.werkwijze.split(':')[0]}</span></div>`;
    });
}
function openLocById(id) { openLoc(sheets[activeIdx].locs.find(l => l.id === id)); }

function autoSave() { localStorage.setItem('inspector_v14_3', JSON.stringify({ sheets, meta: { title: document.getElementById('p-title').value, client: document.getElementById('p-client').value, project: document.getElementById('p-name').value, inspector: document.getElementById('p-inspector').value, date: document.getElementById('p-date').value }})); }
function loadData() {
    const saved = localStorage.getItem('inspector_v14_3'); if(!saved) return;
    const d = JSON.parse(saved); sheets = d.sheets || [];
    if(d.meta) { document.getElementById('p-title').value = d.meta.title; document.getElementById('p-client').value = d.meta.client; document.getElementById('p-name').value = d.meta.project; document.getElementById('p-inspector').value = d.meta.inspector; document.getElementById('p-date').value = d.meta.date; }
    if(sheets.length > 0) switchSheet(0);
}

function exportProject() { const b = new Blob([localStorage.getItem('inspector_v14_3')], {type:'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = `Project.json`; a.click(); }
function importProject(e) { const r = new FileReader(); r.onload = (ev) => { localStorage.setItem('inspector_v14_3', ev.target.result); location.reload(); }; r.readAsText(e.target.files[0]); }

// --- REPORT ---
async function generateReport() {
    const container = document.getElementById('report-content');
    container.innerHTML = "Laden...";
    document.getElementById('report-view').style.display = 'block';
    let html = `<div class="cover-page"><h1>${document.getElementById('p-title').value}</h1><h2>${document.getElementById('p-name').value}</h2><p>${document.getElementById('p-client').value}</p></div>`;
    for(let s of sheets) {
        const screenshot = await new Promise(res => {
            const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d'); const img = new Image();
            img.onload = () => {
                canvas.width = img.width; canvas.height = img.height; ctx.drawImage(img, 0, 0);
                s.locs.forEach((l, idx) => {
                    ctx.beginPath(); ctx.arc(l.x, l.y, 25, 0, Math.PI*2); ctx.fillStyle = l.color; ctx.fill();
                    ctx.fillStyle="white"; ctx.font="bold 26px Arial"; ctx.textAlign="center"; ctx.fillText(idx+1, l.x, l.y+10);
                });
                res(canvas.toDataURL('image/jpeg', 0.8));
            }; img.src = s.imgData;
        });
        html += `<div class="report-page page-break"><h2>Gevel: ${s.name}</h2><img src="${screenshot}" style="width:100%">`;
        s.locs.forEach((l, idx) => {
            html += `<div class="loc-block" style="--bc:${l.color}"><h3>${idx+1}. ${l.naam}</h3><p>${l.werkwijze}</p><div class="photo-grid-rep">${l.fotos.map(f=>`<img src="${f}">`).join('')}</div></div>`;
        });
        html += `</div>`;
    }
    container.innerHTML = html;
}

oCvs.addEventListener('mousedown', handleInteraction);
oCvs.addEventListener('touchstart', (e) => { e.preventDefault(); handleInteraction(e); }, {passive:false});
window.onload = loadData;
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
</script>
</body>
</html>
